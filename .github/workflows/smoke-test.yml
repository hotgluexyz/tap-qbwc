name: Smoke Test

on:
  repository_dispatch:
    types: [smoke_test]  # Custom event type
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]

jobs:
  smoke-test:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout current repository
        uses: actions/checkout@v4


      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'


      - name: Checkout test-framework repository
        uses: actions/checkout@v4
        with:
          repository: hotgluexyz/test-framework
          path: test-framework
          token: ${{ secrets.TEST_GITHUB_ACCESS_TOKEN }}
          fetch-depth: 0


      - name: Set REPO_ROOT environment variable
        run: |
          echo "REPO_ROOT=$(pwd)" >> $GITHUB_ENV


      - name: Setup current repository dependencies
        run: |
          python -m venv .venv
          source .venv/bin/activate
          pip install .
          deactivate


      - name: Setup and run tests
        env:
          BRANCH_NAME: ${{ github.head_ref }}
          REPO_FULL_NAME: ${{ github.event.repository.name }}
          TAP_DIRECTORY: ${{ github.workspace }}
          GIT_SHA: ${{ github.sha }}
          AWS_ACCESS_KEY_ID: ${{ secrets.SMOKETEST_AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.SMOKETEST_AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: us-east-1
          S3_BUCKET: ${{ secrets.SMOKETEST_S3_BUCKET }}
          S3_KEY_PREFIX: ${{ secrets.SMOKETEST_S3_KEY_PREFIX }}
        run: |
          cd test-framework
          # Try to switch to the same branch as the current PR
          echo "BRANCH_NAME: $BRANCH_NAME"
          echo "Available branches in test-framework:"
          git branch -a
          if git show-ref --verify "refs/remotes/origin/$BRANCH_NAME"; then
            git checkout "$BRANCH_NAME"
          else
            echo "Branch $BRANCH_NAME not found in test-framework repository"
            git checkout main
          fi

          python -m venv .venv
          source .venv/bin/activate
          pip install -r requirements.txt
          REPO_NAME=$(echo "$REPO_FULL_NAME" | sed -e 's/^tap-//' -e 's/^target-//')

          # Create timestamp and output file
          TIMESTAMP=$(date +%Y%m%d_%H%M%S)
          OUTPUT_FILE="smoke_test_output.log"

          # Initialize test status flag
          TEST_FAILED=0

          # Run the test and capture both stdout and stderr
          ./bin/smoke_test.sh "$REPO_NAME" '*' --tap-directory "$TAP_DIRECTORY" > "$OUTPUT_FILE" 2>&1 || TEST_FAILED=1

          # Upload to S3 (credentials from AWS_* env vars)
          S3_KEY="${S3_KEY_PREFIX}/${REPO_FULL_NAME}/${BRANCH_NAME//\//_}/${TIMESTAMP}.${GIT_SHA}.log"
          aws s3 cp "$OUTPUT_FILE" "s3://${S3_BUCKET}/${S3_KEY}"

          # Exit based on test status
          if [ $TEST_FAILED -eq 1 ]; then
            exit 1
          else
            exit 0
          fi
