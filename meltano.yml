send_anonymous_usage_stats: true
project_id: "tap-qbwc"
default_environment: test
requires_meltano: ">=4.0"
environments:
- name: test
plugins:
  extractors:
  - name: "tap-qbwc"
    namespace: "tap_qbwc"
    pip_url: -e .
    capabilities:
    - state
    - catalog
    - discover
    - about
    - stream-maps
    - structured-logging

    settings:
    - name: token
      label: Token
      description: The token to access the QBWC API
      sensitive: true

    - name: start_date
      kind: date_iso8601
      label: Start Date
      description: Initial date to start extracting data from

    - name: request_timeout
      kind: integer
      label: Request Timeout
      description: How long to wait for a QBWC request to complete in seconds

    - name: qbwc_is_alive_timeout
      kind: integer
      label: QBWC Is Alive Timeout
      description: How long to wait for a QBWC is alive request to complete in seconds

    - name: is_sandbox
      kind: boolean
      label: Is Sandbox
      description: Whether to use the sandbox environment

    settings_group_validation:
    - [token]

    config:
      start_date: 2000-01-01T00:00:00Z
      qbwc_is_alive_timeout: 3600
      is_sandbox: false

  loaders:
  - name: target-jsonl
    variant: andyh1203
    pip_url: target-jsonl
